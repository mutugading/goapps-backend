# Finance Service Configuration

app:
  name: finance-service
  version: "1.0.0"
  env: development  # development, staging, production

server:
  grpc_port: 50051
  http_port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 5434
  user: finance
  password: finance123
  name: finance_db
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

jwt:
  access_token_secret: "dev-access-secret-change-in-production"
  issuer: "goapps-iam"

cors:
  allowed_origins:
    - "http://localhost:3000"
  max_age: 300

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

auth_redis:
  host: localhost
  port: 6379
  password: ""
  db: 1  # Same Redis DB as IAM for shared token blacklist

oracle:
  host: localhost
  port: 1521
  service: ORCLPDB1
  user: ""        # Override via ORACLE_USER env var
  password: ""    # Override via ORACLE_PASSWORD env var
  max_open_conns: 5
  conn_max_lifetime: 10m

rabbitmq:
  url: "amqp://guest:guest@localhost:5672/"  # Override via RABBITMQ_URL env var
  prefetch_count: 1
  reconnect_delay: 5s

tracing:
  enabled: true
  endpoint: localhost:4317
  insecure: true

rate_limit:
  requests_per_second: 100
  burst_size: 200

logging:
  level: debug  # debug, info, warn, error
  format: console  # console, json

iam_client:
  host: localhost
  port: 50052          # Override via IAM_GRPC_HOST / IAM_GRPC_PORT env
  internal_service_token: ""  # Override via INTERNAL_SERVICE_TOKEN — must match IAM's security.internal_service_token

storage:
  endpoint: localhost:9000
  access_key: minioadmin       # Override via MINIO_ACCESS_KEY env
  secret_key: minioadmin       # Override via MINIO_SECRET_KEY env
  bucket: goapps-staging
  use_ssl: false
  insecure_skip_verify: false
  region: us-east-1
  public_url: ""               # Set when internal endpoint differs from browser-reachable URL
