root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
include_ext = ["go", "yaml"]
include_dir = ["cmd", "internal"]
exclude_dir = ["tmp", "bin", "vendor", "tests", "seeds", "migrations"]
exclude_regex = ["_test\\.go$"]
delay = 1000
stop_on_error = true

[log]
main_only = false
time = false

[misc]
clean_on_exit = true
